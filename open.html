<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS_EO - Open App</title>
    <style>
        body {
            background: linear-gradient(135deg, #0B1F3A 0%, #111111 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .container {
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 2.5em;
            margin: 0 0 10px 0;
            font-weight: 100;
            letter-spacing: 4px;
        }
        
        p {
            font-size: 1.1em;
            margin: 10px 0 30px 0;
            color: #C6A85B;
        }
        
        a {
            display: inline-block;
            background-color: #C6A85B;
            color: #0B1F3A;
            padding: 15px 40px;
            text-decoration: none;
            font-size: 1em;
            font-weight: bold;
            border-radius: 2px;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        a:hover {
            background-color: #fff;
            transform: scale(1.05);
        }
        
        .secondary {
            background-color: transparent;
            border: 2px solid #C6A85B;
            color: #C6A85B;
        }
        
        .secondary:hover {
            background-color: #C6A85B;
            color: #0B1F3A;
        }
        
        .info {
            margin-top: 40px;
            font-size: 0.9em;
            color: #F4F1EA;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ATLAS_EO</h1>
        <p>Global Top-Tier Luxury Fashion</p>
        
        <a href="http://localhost:3000" onclick="openApp()">OPEN APP</a>
        
        <div class="info">
            <p>Make sure the development server is running!</p>
            <p>If you see an error, the server may not be started yet.</p>
        </div>
    </div>
    
    <script>
        function openApp() {
            window.location.href = "http://localhost:3000";
        }
    </script>
</body>
</html>
